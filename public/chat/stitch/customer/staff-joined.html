<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZenTech Support - Quick Chat Popup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "on-secondary-fixed": "#0f0069",
                    "on-primary-fixed": "#251a00",
                    "outline": "#81765f",
                    "on-secondary-fixed-variant": "#3323cc",
                    "inverse-surface": "#313030",
                    "inverse-on-surface": "#f3f0ef",
                    "tertiary-fixed-dim": "#ffb3b6",
                    "on-tertiary-container": "#b20033",
                    "surface-variant": "#e5e2e1",
                    "surface-dim": "#dcd9d9",
                    "error-container": "#ffdad6",
                    "surface-container": "#f0edec",
                    "primary-container": "#ffc700",
                    "background": "#fcf9f8",
                    "surface-bright": "#fcf9f8",
                    "on-tertiary-fixed": "#40000c",
                    "secondary-fixed-dim": "#c3c0ff",
                    "secondary": "#4b41e1",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#ffdada",
                    "primary-fixed-dim": "#f5bf00",
                    "primary": "#765b00",
                    "outline-variant": "#d2c5ab",
                    "on-surface-variant": "#4f4632",
                    "on-background": "#1c1b1b",
                    "surface": "#fcf9f8",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#ffbec0",
                    "surface-tint": "#765b00",
                    "secondary-fixed": "#e2dfff",
                    "primary-fixed": "#ffdf94",
                    "on-secondary": "#ffffff",
                    "tertiary": "#be0037",
                    "on-tertiary-fixed-variant": "#920028",
                    "inverse-primary": "#f5bf00",
                    "secondary-container": "#645efb",
                    "on-surface": "#1c1b1b",
                    "on-secondary-container": "#fffbff",
                    "on-primary-fixed-variant": "#594400",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e5e2e1",
                    "on-primary-container": "#6e5400",
                    "surface-container-high": "#ebe7e7",
                    "surface-container-low": "#f6f3f2",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "display": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden">
<!-- Blurred Background (Product Detail Page Context) -->
<div class="fixed inset-0 z-0 select-none pointer-events-none">
<div class="absolute inset-0 bg-surface/40 backdrop-blur-md z-10"></div>
<img alt="Tech Background" class="w-full h-full object-cover opacity-80" data-alt="sleek modern minimalist technology product display with subtle warm lighting and deep shadows creating a premium aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2euI9gUbNah3t1bvQQ6-PYB9wEFVz-HfJrPdNqxAIBSjg4nippPEhewS_GYF7patiIq_cOT9AqtFrHRx3LVqkDRDQM5lvhkMJYwFJ1rZEbqEEs4x2CbH7G2NfvtOR-QcxvNjDwMR3gA-e5eDcYbc5Av_NInjCyRHMz98jCBVfPkcL2vhY4XvbQBqL9xgzJb3MHjq4nUNwIQqJacgY5eBAYtAEsuIL16P42QGKSKGX6x-9H0iqg7zt6EU0JUXveGZEbRmqUj2YhGE"/>
<!-- Mock Content behind blur -->
<div class="absolute inset-0 z-0 p-12 flex flex-col gap-8 opacity-30">
<div class="w-1/2 h-16 bg-surface-container-highest rounded-lg"></div>
<div class="w-3/4 h-96 bg-surface-container-highest rounded-xl"></div>
<div class="w-1/3 h-8 bg-surface-container-highest rounded-lg"></div>
</div>
</div>
<!-- Quick Chat Popup -->
<div class="fixed bottom-6 right-6 z-50 w-[360px] flex flex-col bg-surface-container-lowest rounded-[10px] shadow-[0_32px_64px_-16px_rgba(28,27,27,0.12)] border-[0.5px] border-outline-variant/15 overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between p-4 bg-surface-container-low border-b border-outline-variant/10">
<div class="flex items-center gap-3">
<div class="relative w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-primary-fixed" data-icon="smart_toy">person</span>
<!-- Online Status Indicator -->
<div class="absolute bottom-0 right-0 w-3 h-3 bg-[#22c55e] rounded-full border-2 border-surface-container-lowest"></div>
</div>
<div>
<h3 class="text-sm font-semibold text-on-surface tracking-tight">Alex - Support Agent</h3>
<p class="text-xs text-on-surface-variant">Online</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-xs font-medium text-on-surface hover:bg-surface-variant transition-colors border border-outline-variant/30">
<span class="material-symbols-outlined text-[14px]">support_agent</span>
    Staff
</button>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-1.5 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-xl" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Chat Area -->
<div class="flex-1 p-5 overflow-y-auto space-y-4 bg-surface h-[320px]">
<!-- AI Greeting -->
<div class="flex gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container shrink-0 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-fixed text-sm" data-icon="smart_toy">smart_toy</span>
</div>
<div class="bg-[#F0FDF4] p-3 rounded-xl rounded-tl-sm shadow-sm text-sm text-on-surface">
<p>Hello! I'm your ZenTech AI Assistant. How can I help you with your tech inquiry today?</p>
</div>
</div>
<!-- Action Buttons (Suggestions) -->
<div class="flex justify-center py-2">
<span class="text-[11px] font-medium text-on-surface-variant/70 uppercase tracking-wider px-3 py-1 bg-surface-container-low rounded-full">Support agent Alex has joined the chat</span>
</div><div class="flex gap-3">
<div class="w-8 h-8 rounded-full bg-secondary-container shrink-0 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container text-sm">person</span>
</div>
<div class="bg-secondary-fixed p-3 rounded-xl rounded-tl-sm shadow-sm text-sm text-on-secondary-fixed-variant">
<p>Hello! I'm Alex from the support team. How can I help you further?</p>
</div>
</div></div>
<!-- Footer / Input -->
<div class="p-4 bg-surface-container-low border-t border-outline-variant/15">
<div class="flex items-center gap-1 bg-surface-container-lowest rounded-full p-1 pl-2 shadow-sm focus-within:ring-2 focus-within:ring-primary focus-within:ring-opacity-50 transition-shadow">
<div class="relative flex items-center pr-1 border-r border-outline-variant/20">
<!-- Attachment Menu Popup (Open State) -->
<div class="absolute bottom-full left-0 mb-3 w-36 bg-surface-container-lowest rounded-lg shadow-lg border border-outline-variant/15 py-1 z-50">
<button class="w-full flex items-center gap-3 px-3 py-2 text-sm text-on-surface hover:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">image</span>
        Image
    </button>
<button class="w-full flex items-center gap-3 px-3 py-2 text-sm text-on-surface hover:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">videocam</span>
        Video
    </button>
<button class="w-full flex items-center gap-3 px-3 py-2 text-sm text-on-surface hover:bg-surface-variant transition-colors text-left">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">attach_file</span>
        File
    </button>
</div>
<button class="p-1.5 rounded-full text-on-surface hover:bg-surface-variant transition-colors bg-surface-variant/50" title="Add attachment">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
<input class="flex-1 bg-transparent border-none text-sm text-on-surface placeholder-on-surface-variant focus:ring-0 py-2 outline-none pl-2" placeholder="Type your message..." type="text"/>
<button class="w-10 h-10 rounded-full bg-primary-container hover:bg-primary-fixed-dim text-on-primary-fixed flex items-center justify-center transition-colors shadow-sm shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="send" data-weight="fill">send</span>
</button>
</div>
</div>
</div>
</body></html>
