<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | ZenTech</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#e5e2e1",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#313030",
              "surface-dim": "#dcd9d9",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffdada",
              "on-primary": "#ffffff",
              "surface-container-low": "#f6f3f2",
              "on-secondary-fixed-variant": "#3323cc",
              "on-tertiary-fixed-variant": "#920028",
              "on-primary-fixed": "#251a00",
              "secondary-container": "#645efb",
              "background": "#fcf9f8",
              "on-surface-variant": "#4f4632",
              "secondary": "#4b41e1",
              "surface-container-lowest": "#ffffff",
              "outline": "#81765f",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#40000c",
              "surface": "#fcf9f8",
              "on-secondary": "#ffffff",
              "surface-container-high": "#ebe7e7",
              "primary-fixed-dim": "#f5bf00",
              "inverse-primary": "#f5bf00",
              "primary": "#765b00",
              "tertiary-fixed-dim": "#ffb3b6",
              "outline-variant": "#d2c5ab",
              "inverse-on-surface": "#f3f0ef",
              "on-background": "#1c1b1b",
              "on-secondary-fixed": "#0f0069",
              "error": "#ba1a1a",
              "secondary-fixed-dim": "#c3c0ff",
              "tertiary-container": "#ffbec0",
              "surface-tint": "#765b00",
              "primary-fixed": "#ffdf94",
              "on-primary-container": "#6e5400",
              "tertiary": "#be0037",
              "surface-variant": "#e5e2e1",
              "on-surface": "#1c1b1b",
              "on-error-container": "#93000a",
              "secondary-fixed": "#e2dfff",
              "on-primary-fixed-variant": "#594400",
              "on-tertiary-container": "#b20033",
              "surface-container": "#f0edec",
              "primary-container": "#ffc700",
              "surface-bright": "#fcf9f8",
              "on-secondary-container": "#fffbff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-md z-10">
<!-- Brand Identity Section (Matching SCREEN_90) -->
<div class="text-center">
<div class="flex flex-col items-center">
<div class="flex items-center gap-3">
<div class="relative skew-x-[-15deg] w-12 h-11 p-[2px] rounded-[4px] bg-gradient-to-br from-[#FFC700] to-[#FF8A00]">
<div class="w-full h-full bg-[#0a0a0a] rounded-[3px] flex items-center justify-center">
<span class="text-transparent bg-clip-text bg-gradient-to-br from-[#FFC700] to-[#FF8A00] font-black text-[16px] italic tracking-tighter -skew-x-[-15deg] pr-[1px]">ZT</span>
</div>
</div>
<div class="flex items-baseline font-black italic uppercase tracking-tighter text-4xl">
<span class="text-on-background">Zen</span>
<span class="text-on-surface-variant/40">Tech</span>
</div>
</div>
</div>
</div>
<h1 class="text-4xl font-black uppercase tracking-tighter text-on-background text-center mt-16 mb-8">REGISTER</h1>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_64px_64px_-12px_rgba(28,27,27,0.06)] p-10 border border-outline-variant/15">
<form class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="block text-[0.75rem] uppercase tracking-[0.05em] font-bold text-on-surface-variant ml-1">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="Johnathan Sterling" type="text"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">person</span>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[0.75rem] uppercase tracking-[0.05em] font-bold text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="name@monolith.tech" type="email"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">alternate_email</span>
</div>
</div>
<!-- Password Fields Grid -->
<div class="grid grid-cols-1 gap-6">
<div class="space-y-2">
<label class="block text-[0.75rem] uppercase tracking-[0.05em] font-bold text-on-surface-variant ml-1">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">lock</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-[0.75rem] uppercase tracking-[0.05em] font-bold text-on-surface-variant ml-1">Confirm Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">verified_user</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-fixed font-bold py-5 rounded-full shadow-lg shadow-primary-container/20 hover:bg-primary-fixed-dim active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span>Register</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">Already have an account? <a class="text-secondary font-bold ml-1 hover:opacity-70 transition-opacity uppercase tracking-wider text-[0.7rem]" href="#">Sign In</a></p>
</footer>
</div>
</div>
</main>
</body></html>
