<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar suppression: Login is transactional/focused journey. Explicitly following "The Destination Rule" -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-md z-10">
<!-- Brand Identity Section -->
<div class="text-center">
<div class="flex flex-col items-center">
<div class="flex items-center gap-3">
<!-- Skewed Box Frame with Gradient Border -->
<div class="relative skew-x-[-15deg] w-12 h-11 p-[2px] rounded-[4px] bg-gradient-to-br from-[#FFC700] to-[#FF8A00]">
<div class="w-full h-full bg-[#0a0a0a] rounded-[3px] flex items-center justify-center">
<!-- Vibrant Monogram Text -->
<span class="text-transparent bg-clip-text bg-gradient-to-br from-[#FFC700] to-[#FF8A00] font-black text-[16px] italic tracking-tighter -skew-x-[-15deg] pr-[1px]">ZT</span>
</div>
</div>
<!-- Brand Text -->
<div class="flex items-baseline font-black italic uppercase tracking-tighter text-4xl">
<span class="text-on-background">Zen</span>
<span class="text-on-surface-variant/40">Tech</span>
</div>
</div>
</div>
</div><h1 class="text-4xl font-black uppercase tracking-tighter text-on-background text-center mt-16 mb-8">WELCOME BACK</h1>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_64px_64px_-12px_rgba(28,27,27,0.06)] p-10 border border-outline-variant/15">
<form class="space-y-8">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[0.75rem] uppercase tracking-[0.05em] font-bold text-on-surface-variant ml-1">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="email@monolith.tech" type="email"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-[0.75rem] uppercase tracking-[0.05em] font-bold text-on-surface-variant">PASSWORD</label>
<a class="text-[0.7rem] font-bold text-secondary uppercase tracking-wider hover:opacity-70 transition-opacity" href="#">
                                Forgot?
                            </a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline/40">lock</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-on-primary-fixed font-bold py-5 rounded-full shadow-lg shadow-primary-container/20 hover:bg-primary-fixed-dim active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-[0.65rem] font-black text-outline/40 uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<button class="w-full bg-white border border-[#E5E7EB] text-[#111827] font-bold py-4 rounded-full shadow-sm hover:bg-gray-50 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="button">

</svg>
<span>Sign in with Google</span>
</button>
