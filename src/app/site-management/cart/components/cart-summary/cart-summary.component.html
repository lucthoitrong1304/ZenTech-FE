<aside class="rounded-[10px] bg-[#f6f3f2] p-6 shadow-[0_28px_90px_-70px_rgba(16,16,16,0.7)] lg:sticky lg:top-28 lg:p-8">
  <h2 class="text-3xl font-black tracking-tight text-[#101010]">Order Summary</h2>

  <div class="mt-8 grid gap-5">
    <div class="flex items-center justify-between gap-4">
      <span class="font-semibold text-[#4f4632]">Items</span>
      <span class="text-lg font-black tabular-nums">{{ itemCount() }}</span>
    </div>
    <div class="flex items-center justify-between gap-4">
      <span class="font-semibold text-[#4f4632]">Subtotal</span>
      <span class="text-lg font-black tabular-nums">
        {{ subtotal() | currency: 'VND' : 'symbol' : '1.0-0' }}
      </span>
    </div>
    <div class="flex items-center justify-between gap-4">
      <span class="font-semibold text-[#4f4632]">Estimated Shipping</span>
      <span class="text-lg font-black uppercase text-[#4b41e1]">Free</span>
    </div>

    <div class="mt-3 border-t border-[#d2c5ab]/30 pt-6">
      <span class="text-[11px] font-black uppercase tracking-[0.18em] text-[#81765f]">
        Total Amount
      </span>
      <p class="mt-2 text-4xl font-black tracking-tight tabular-nums text-[#101010]">
        {{ total() | currency: 'VND' : 'symbol' : '1.0-0' }}
      </p>
    </div>

    <button
      type="button"
      class="mt-3 inline-flex min-h-14 w-full items-center justify-center gap-3 rounded-full bg-[#ffc700] px-5 text-base font-black text-[#251a00] shadow-[0_20px_42px_-30px_rgba(255,199,0,0.95)] transition hover:bg-[#f5bf00] active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:bg-[#ffc700] disabled:active:scale-100"
      [disabled]="!canCheckout()"
      (click)="checkout.emit()"
    >
      {{ checkoutLabel() }}
      <svg lucideArrowRight class="h-5 w-5" [attr.stroke-width]="2.3"></svg>
    </button>

    <div class="mt-4 grid gap-3">
      <div class="flex items-center gap-3 rounded-[8px] bg-white/70 p-3">
        <svg lucideShieldCheck class="h-5 w-5 shrink-0 text-[#4b41e1]" [attr.stroke-width]="2"></svg>
        <div class="min-w-0">
          <p class="text-xs font-black uppercase tracking-[0.12em]">Secure Payment</p>
          <p class="truncate text-[11px] font-semibold text-[#4f4632]">SSL encrypted transaction</p>
        </div>
      </div>
      <div class="flex items-center gap-3 rounded-[8px] bg-white/70 p-3">
        <svg lucideTruck class="h-5 w-5 shrink-0 text-[#4b41e1]" [attr.stroke-width]="2"></svg>
        <div class="min-w-0">
          <p class="text-xs font-black uppercase tracking-[0.12em]">Fast Delivery</p>
          <p class="truncate text-[11px] font-semibold text-[#4f4632]">Ships within 24-48 hours</p>
        </div>
      </div>
    </div>
  </div>
</aside>
