<!-- ============================================================
     SITE FOOTER – Customer-facing
     GravaStar style: dark-white, link columns, subscribe, social
     ============================================================ -->
<footer class="site-footer">
  <div class="site-footer__container">

    <!-- ── LINK COLUMNS ───────────────────────────────────── -->
    <div class="site-footer__grid">

      <!-- Dynamic columns -->
      @for (col of columns; track col.heading) {
        <div class="site-footer__col">
          <h3 class="site-footer__col-heading">{{ col.heading }}</h3>
          @for (link of col.links; track link.label) {
            <a [href]="link.href" class="site-footer__col-link">{{ link.label }}</a>
          }
        </div>
      }

      <!-- Contact column -->
      <div class="site-footer__col">
        <h3 class="site-footer__col-heading">Contact Us</h3>
        <p class="site-footer__contact-text">
          Please email us at<br>
          <a href="mailto:service@zentech.vn" class="site-footer__contact-email">service&#64;zentech.vn</a><br>
          and you'll get a response within 1 business day.
        </p>
        <a href="#" class="site-footer__follow-btn">
          <svg fill="currentColor" viewBox="0 0 24 24" class="site-footer__follow-icon">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
          Follow on shop
        </a>
      </div>

      <!-- Subscribe column -->
      <div class="site-footer__col site-footer__col--subscribe">
        <h2 class="site-footer__subscribe-heading">Get Discounts<br>&amp; Stay Updated</h2>
        <form class="site-footer__form" (submit)="$event.preventDefault()">
          <input type="email" placeholder="Your e-mail" class="site-footer__input" aria-label="Email subscription">
          <button type="submit" class="site-footer__submit" aria-label="Subscribe">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
        </form>
      </div>

    </div>

    <!-- ── SOCIAL + COUNTRY ────────────────────────────────── -->
    <div class="site-footer__social-row">
      <div class="site-footer__socials">
        <a href="#" class="site-footer__social-link" aria-label="Facebook">
          <svg class="site-footer__social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
        </a>
        <a href="#" class="site-footer__social-link" aria-label="X / Twitter">
          <svg class="site-footer__social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a href="#" class="site-footer__social-link" aria-label="Instagram">
          <svg class="site-footer__social-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="4" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="#" class="site-footer__social-link" aria-label="YouTube">
          <svg class="site-footer__social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
        </a>
        <a href="#" class="site-footer__social-link" aria-label="TikTok">
          <svg class="site-footer__social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93v7.2c0 1.96-.5 3.96-1.6 5.56-1.1 1.6-2.7 2.82-4.6 3.33-1.9.51-3.95.46-5.8-.18-1.85-.64-3.46-1.93-4.5-3.54-1.04-1.6-1.55-3.55-1.4-5.5.15-1.95.96-3.77 2.27-5.18 1.31-1.4 3.06-2.3 4.96-2.58v4.05c-1.02.13-1.95.7-2.58 1.5-.63.8-.88 1.83-.7 2.83.18 1 .8 1.85 1.65 2.37.85.52 1.88.66 2.85.38.97-.28 1.76-1 2.22-1.87.46-.87.58-1.9.33-2.85V.02z"/></svg>
        </a>
      </div>

      <button class="site-footer__country">
        <span class="site-footer__flag">★</span>
        <span>Vietnam (VND đ)</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="site-footer__chevron">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
    </div>

    <!-- ── BOTTOM BAR ──────────────────────────────────────── -->
    <div class="site-footer__bottom">
      <p class="site-footer__copyright">© {{ year }}, ZenTech.</p>
      <img src="/images/payment-methods.png" alt="Accepted Payment Methods" class="site-footer__payment">
    </div>

  </div>
</footer>
