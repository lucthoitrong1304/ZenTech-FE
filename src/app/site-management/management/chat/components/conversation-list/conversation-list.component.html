<section
  class="conversation-list flex h-full w-80 shrink-0 flex-col overflow-hidden border-r border-[#d2c5ab]/30 bg-white"
  aria-label="Danh sách tư vấn khách hàng"
>
  <div class="shrink-0 border-b border-[#d2c5ab]/30 p-4">
    <label class="relative flex items-center">
      <svg
        lucideSearch
        class="absolute left-3 h-4 w-4 text-[#4f4632]/70"
        [attr.stroke-width]="2"
      ></svg>
      <input
        class="h-10 w-full rounded-[8px] border-0 bg-[#f6f3f2] pl-9 pr-4 text-sm text-[#1c1b1b] outline-none ring-1 ring-transparent transition placeholder:text-[#4f4632]/70 focus:bg-white focus:ring-[#ffc700]"
        type="search"
        placeholder="Tìm kiếm tư vấn..."
        [value]="searchKeyword()"
        (input)="onSearchChange($event)"
      />
    </label>
  </div>

  <div class="chat-scrollbar min-h-0 flex-1 overscroll-contain space-y-1 overflow-y-auto p-2">
    @for (conversation of conversations(); track conversation.id) {
      <button
        type="button"
        class="group relative flex w-full min-w-0 gap-3 rounded-[8px] p-3 text-left transition hover:bg-[#f6f3f2]"
        [class.bg-[#ffc700]/10]="selectedConversationId() === conversation.id"
        (click)="conversationSelected.emit(conversation.id)"
      >
        @if (selectedConversationId() === conversation.id) {
          <span
            class="absolute left-0 top-1/2 h-8 w-1 -translate-y-1/2 rounded-r-full bg-[#ffc700]"
            aria-hidden="true"
          ></span>
        }

        <span class="relative shrink-0">
          @if (conversation.customer.avatarUrl && !isImageFailed(conversation.id)) {
            <img
              class="h-10 w-10 rounded-[5px] bg-[#f0edec] object-cover"
              [src]="conversation.customer.avatarUrl"
              [alt]="conversation.customer.fullName"
              referrerpolicy="no-referrer"
              (error)="onImageError(conversation.id)"
            />
          } @else {
            <span
              class="grid h-10 w-10 place-items-center rounded-[5px] bg-[#645efb] text-xs font-black text-white"
            >
              {{ conversation.customer.initials }}
            </span>
          }

          @if (conversation.customer.online) {
            <span
              class="absolute -bottom-1 -right-1 h-3 w-3 rounded-full border-2 border-white bg-green-500"
              aria-label="Online"
            ></span>
          }
        </span>

        <span class="min-w-0 flex-1">
          <span class="mb-0.5 flex min-w-0 items-baseline justify-between gap-3">
            <strong class="min-w-0 truncate text-sm text-[#1c1b1b]">
              {{ conversation.customer.fullName }}
            </strong>
            <span class="shrink-0 text-[10px] font-bold text-[#765b00]">
              {{ conversation.lastMessageAtLabel }}
            </span>
          </span>
          <span class="block truncate text-xs font-medium text-[#4f4632]">
            {{ conversation.lastMessagePreview }}
          </span>
        </span>

        @if (conversation.unreadCount > 0) {
          <span
            class="grid h-6 w-6 shrink-0 place-items-center self-center rounded-full bg-[#ffc700] text-[11px] font-black text-[#1c1b1b]"
          >
            {{ conversation.unreadCount }}
          </span>
        }
      </button>
    } @empty {
      <div class="px-4 py-10 text-center text-sm font-semibold text-[#4f4632]">
        Không có tư vấn phù hợp.
      </div>
    }
  </div>
</section>
