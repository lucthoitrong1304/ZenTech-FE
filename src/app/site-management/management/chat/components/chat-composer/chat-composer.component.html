<footer class="shrink-0 border-t border-[#d2c5ab]/30 bg-white p-4">
  @if (uploads().length > 0) {
    <section class="mb-3 grid gap-2">
      @for (upload of uploads(); track upload.id) {
        <article class="flex min-w-0 items-center gap-3 rounded-[6px] bg-[#f6f3f2] p-2">
          <span
            class="grid h-9 w-9 shrink-0 place-items-center rounded-[5px]"
            [class.bg-white]="upload.status === 'PENDING'"
            [class.text-[#4f4632]]="upload.status === 'PENDING'"
            [class.bg-[#101010]]="upload.status === 'UPLOADING'"
            [class.text-[#ffc700]]="upload.status === 'UPLOADING'"
            [class.bg-red-100]="upload.status === 'FAILED'"
            [class.text-red-700]="upload.status === 'FAILED'"
          >
            <svg lucideFileUp class="h-4 w-4" [attr.stroke-width]="2"></svg>
          </span>
          <span class="min-w-0 flex-1">
            <strong class="block truncate text-xs font-bold text-[#101010]">
              {{ upload.fileName }}
            </strong>
            <small class="block truncate text-[11px] font-semibold text-[#4f4632]">
              {{ upload.sizeLabel }} -
              @if (upload.status === 'PENDING') {
                Chờ gửi
              } @else if (upload.status === 'UPLOADING') {
                Đang tải lên
              } @else {
                Lỗi tải lên
              }
            </small>
          </span>
          <button
            type="button"
            class="grid h-8 w-8 place-items-center rounded-[5px] text-[#4f4632] transition hover:bg-white hover:text-[#1c1b1b] disabled:cursor-not-allowed disabled:opacity-50"
            [disabled]="disabled() || upload.status === 'UPLOADING'"
            (click)="uploadRemoved.emit(upload.id)"
            title="Xóa tệp"
          >
            <svg lucideX class="h-4 w-4" [attr.stroke-width]="2"></svg>
          </button>
        </article>
      }
    </section>
  }

  <form
    class="flex items-end gap-2 rounded-[8px] border border-[#d2c5ab]/20 bg-[#f6f3f2] p-2 transition focus-within:border-[#ffc700] focus-within:ring-1 focus-within:ring-[#ffc700]"
    (ngSubmit)="submit()"
  >
    <input
      #fileInput
      type="file"
      multiple
      class="hidden"
      (change)="onFileChange($event)"
    />

    <button
      type="button"
      class="grid h-10 w-10 shrink-0 place-items-center rounded-[5px] text-[#4f4632] transition hover:bg-white hover:text-[#1c1b1b] disabled:cursor-not-allowed disabled:opacity-50"
      title="Đính kèm"
      [disabled]="disabled()"
      (click)="openFilePicker()"
    >
      <svg lucidePlus class="h-5 w-5" [attr.stroke-width]="2"></svg>
    </button>

    <textarea
      class="max-h-32 min-h-10 flex-1 resize-none border-0 bg-transparent py-2 text-sm text-[#1c1b1b] outline-none placeholder:text-[#4f4632]/70 focus:ring-0 disabled:cursor-not-allowed disabled:opacity-50"
      rows="1"
      name="chatDraft"
      [placeholder]="disabled() ? 'Cuộc hội thoại đã đóng' : 'Nhập tin nhắn...'"
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      (keydown.enter)="onEnter($event)"
      (paste)="onPaste($event)"
      [disabled]="disabled()"
    ></textarea>

    <button
      type="submit"
      class="grid h-10 w-10 shrink-0 place-items-center rounded-[5px] text-[#765b00] transition hover:bg-[#ffc700]/15 disabled:cursor-not-allowed disabled:opacity-50"
      [disabled]="disabled() || (!draft().trim() && !hasPendingAttachments())"
      title="Gửi"
    >
      <svg lucideSend class="h-5 w-5" [attr.stroke-width]="2"></svg>
    </button>
  </form>
</footer>
