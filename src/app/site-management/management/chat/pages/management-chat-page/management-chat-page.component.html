<section class="management-chat-shell">
  @if (managementShellUi.sidebarMode() === 'chatFilters') {
  <app-chat-filter-sidebar
    [statusCounts]="store.statusCounts()"
    [expertRequestCounts]="store.expertRequestCounts()"
    [activeStatus]="store.statusFilter()"
    [activeExpertRequest]="store.expertRequestFilter()"
    (statusSelected)="store.setStatusFilter($event)"
    (expertRequestSelected)="store.setExpertRequestFilter($event)"
    (adminSidebarRequested)="showAdminSidebar()"
  />
  }

  <main class="management-chat-workspace">
    <app-conversation-list
      [conversations]="store.filteredConversations()"
      [selectedConversationId]="store.selectedConversationId()"
      [searchKeyword]="store.searchKeyword()"
      (searchKeywordChanged)="store.setSearchKeyword($event)"
      (conversationSelected)="store.selectConversation($event)"
    />

    <section class="management-chat-detail">
      @if (store.loading()) {
        <div class="grid h-full place-items-center text-sm font-bold text-[#4f4632]">
          Đang tải tư vấn khách hàng...
        </div>
      } @else if (store.selectedConversation(); as conversation) {
        <app-chat-header
          [conversation]="conversation"
          [mediaDrawerOpen]="store.mediaDrawerOpen()"
          (mediaClicked)="store.toggleMediaDrawer()"
          (acceptClicked)="store.acceptConversation()"
          (transferClicked)="store.acceptConversation()"
          (closeClicked)="store.closeConversation()"
        />

        <app-message-timeline
          [conversation]="conversation"
          [messages]="store.selectedMessages()"
        />

        <app-chat-composer (messageSubmitted)="store.sendStaffMessage($event)" />
      } @else {
        <app-chat-empty-state />
      }
    </section>
  </main>

  <app-chat-media-drawer
    [open]="store.mediaDrawerOpen()"
    [activeTab]="store.activeMediaTab()"
    [mediaItems]="store.selectedMedia()"
    (closed)="store.closeMediaDrawer()"
    (tabSelected)="store.setMediaTab($event)"
  />
</section>
