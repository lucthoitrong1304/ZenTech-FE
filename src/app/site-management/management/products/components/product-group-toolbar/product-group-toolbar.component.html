<div class="product-group-toolbar">
  <label class="product-group-toolbar__search">
    <svg lucideSearch [attr.stroke-width]="2"></svg>
    <input
      type="search"
      [value]="keyword()"
      placeholder="Tìm nhóm sản phẩm..."
      (input)="onKeywordInput($event)"
      (keydown.enter)="onKeywordEnter($event)"
    />
  </label>

  <select
    class="product-group-toolbar__select"
    aria-label="Lọc trạng thái nhóm"
    [value]="activeFilter()"
    (change)="onActiveFilterChange($event)"
  >
    <option value="all">Tất cả trạng thái</option>
    <option value="active">Đang hoạt động</option>
    <option value="inactive">Ngừng hoạt động</option>
  </select>

  <select
    class="product-group-toolbar__select product-group-toolbar__select--compact"
    aria-label="Sắp xếp nhóm"
    [value]="sort()"
    (change)="onSortChange($event)"
  >
    <option value="name,asc">Tên A-Z</option>
    <option value="productCount,desc">Nhiều sản phẩm</option>
    <option value="productCount,asc">Ít sản phẩm</option>
  </select>

  <button
    type="button"
    class="product-group-toolbar__filter"
    [disabled]="loading()"
    (click)="applyFilters.emit()"
  >
    <svg lucideFilter [attr.stroke-width]="2"></svg>
    <span>Lọc</span>
    @if (activeFilterCount() > 0) {
      <strong>{{ activeFilterCount() }}</strong>
    }
  </button>

  <button
    type="button"
    class="product-group-toolbar__reset"
    [disabled]="loading()"
    (click)="resetFilters.emit()"
  >
    <svg lucideX [attr.stroke-width]="2"></svg>
    <span>Xóa</span>
  </button>
</div>
