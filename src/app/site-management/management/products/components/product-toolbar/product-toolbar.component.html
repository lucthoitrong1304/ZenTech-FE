<div class="product-toolbar">
  <label class="product-toolbar__search">
    <svg lucideSearch [attr.stroke-width]="2"></svg>
    <input
      type="search"
      [value]="keyword()"
      placeholder="Tìm tên sản phẩm hoặc SKU..."
      (input)="onKeywordInput($event)"
      (keydown.enter)="onKeywordEnter($event)"
    />
  </label>

  <select
    class="product-toolbar__select"
    aria-label="Lọc danh mục sản phẩm"
    [value]="categoryId()"
    (change)="onCategoryChange($event)"
  >
    <option value="all">Tất cả danh mục</option>
    @for (category of categories(); track category.categoryId) {
      <option [value]="category.categoryId">{{ category.name }}</option>
    }
  </select>

  <select
    class="product-toolbar__select"
    aria-label="Lọc trạng thái kho"
    [value]="stockStatus()"
    (change)="onStockStatusChange($event)"
  >
    <option value="all">Tất cả trạng thái</option>
    <option value="IN_STOCK">Còn hàng</option>
    <option value="LOW_STOCK">Sắp hết hàng</option>
    <option value="OUT_OF_STOCK">Hết hàng</option>
  </select>

  <select
    class="product-toolbar__select product-toolbar__select--compact"
    aria-label="Sắp xếp sản phẩm"
    [value]="sort()"
    (change)="onSortChange($event)"
  >
    <option value="name,asc">Tên A-Z</option>
    <option value="price,desc">Giá cao</option>
    <option value="price,asc">Giá thấp</option>
    <option value="stock,asc">Tồn kho thấp</option>
  </select>

  <button type="button" class="product-toolbar__filter" [disabled]="loading()" (click)="applyFilters.emit()">
    <svg lucideFilter [attr.stroke-width]="2"></svg>
    <span>Lọc</span>
    @if (activeFilterCount() > 0) {
      <strong>{{ activeFilterCount() }}</strong>
    }
  </button>

  <button type="button" class="product-toolbar__reset" [disabled]="loading()" (click)="resetFilters.emit()">
    <svg lucideX [attr.stroke-width]="2"></svg>
    <span>Xóa</span>
  </button>
</div>
