<app-management-page-shell>
  <app-management-page-hero
    eyebrow="Hệ thống"
    title="Quản lý Sản phẩm"
    description="Quản lý danh mục, tồn kho, SKU và trạng thái hiển thị sản phẩm."
  >
    <button
      hero-actions
      appHasPermission="PRODUCT_CREATE"
      type="button"
      class="zt-management-primary-action"
      (click)="addProduct()"
    >
      <svg lucidePackagePlus [attr.stroke-width]="2.2"></svg>
      <span>Thêm sản phẩm mới</span>
    </button>
  </app-management-page-hero>

  <div class="zt-management-stats-grid">
    <app-management-stat-card
      label="Tổng sản phẩm"
      [value]="store.stats().totalProducts"
      hint="+12% tháng này"
      tone="info"
    >
      <svg stat-icon lucideWarehouse [attr.stroke-width]="2"></svg>
    </app-management-stat-card>

    <app-management-stat-card
      label="Hết hàng"
      [value]="store.stats().outOfStock"
      hint="Cần nhập thêm"
      tone="danger"
    >
      <svg stat-icon lucideTriangleAlert [attr.stroke-width]="2"></svg>
    </app-management-stat-card>

    <app-management-stat-card
      label="Giá trị kho"
      [value]="(store.stats().inventoryValue | currency: 'VND' : 'symbol' : '1.0-0') ?? ''"
      hint="Ước tính theo tồn kho"
      tone="accent"
    >
      <svg stat-icon lucideWallet [attr.stroke-width]="2"></svg>
    </app-management-stat-card>

    <app-management-stat-card
      label="AI dự báo xu hướng"
      value="Nhu cầu Gaming tăng 25%"
      [hint]="store.stats().lowStock + ' SKU đang sắp hết hàng'"
      tone="dark"
    >
      <svg stat-icon lucideSparkles [attr.stroke-width]="2"></svg>
    </app-management-stat-card>
  </div>

  <app-management-toolbar-surface>
    <app-product-toolbar
      [keyword]="store.query().keyword"
      [categoryId]="store.query().categoryId"
      [stockStatus]="store.query().stockStatus"
      [sort]="store.query().sort"
      [categories]="store.categories()"
      [activeFilterCount]="store.activeFilterCount()"
      [loading]="store.loading()"
      (keywordChange)="store.setKeyword($event)"
      (categoryChange)="store.setCategoryFilter($event)"
      (stockStatusChange)="setStockFilter($event)"
      (sortChange)="setSort($event)"
      (applyFilters)="store.applyFilters()"
      (resetFilters)="store.resetFilters()"
    />
  </app-management-toolbar-surface>

  <app-product-table
    [products]="store.products()"
    [loading]="store.loading()"
    [page]="store.query().page"
    [totalPages]="store.totalPages()"
    [totalElements]="store.totalElements()"
    [pageStart]="store.pageStart()"
    [pageEnd]="store.pageEnd()"
    [canGoPrevious]="store.canGoPrevious()"
    [canGoNext]="store.canGoNext()"
    (editProduct)="editProduct($event)"
    (deleteProduct)="confirmDeleteProduct($event)"
    (pageChange)="store.goToPage($event)"
  />

  <app-product-dialog
    [visible]="store.dialogVisible()"
    [mode]="store.dialogMode()"
    [draft]="store.formValue()"
    [categories]="store.categories()"
    [saving]="store.saving()"
    [loadingDetail]="store.loadingDetail()"
    [errors]="store.formErrors()"
    (close)="store.closeDialog()"
    (save)="store.submitProductForm()"
    (draftChange)="store.updateFormValue($event)"
  />
</app-management-page-shell>
