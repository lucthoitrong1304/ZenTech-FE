<p-dialog
  [visible]="isOpen()"
  (visibleChange)="!$event && onHide()"
  [modal]="true"
  [dismissableMask]="true"
  [showHeader]="false"
  [draggable]="false"
  [resizable]="false"
  (onShow)="onDialogShow()"
  styleClass="command-palette-dialog w-full max-w-2xl mx-4 sm:mx-auto mt-24 mb-auto rounded-2xl shadow-2xl bg-white overflow-hidden border border-gray-100"
>
  <div class="flex flex-col max-h-[80vh]">
    <!-- Search Input Area -->
    <div class="flex items-center px-4 py-3 border-b border-gray-100 relative bg-white z-10">
      <svg lucideSearch class="text-gray-400 w-5 h-5 flex-shrink-0" [attr.stroke-width]="2"></svg>
      <input
        #searchInput
        type="text"
        class="flex-1 appearance-none bg-transparent border-none outline-none ring-0 px-3 py-2 text-base text-gray-900 placeholder-gray-400 w-full"
        placeholder="Tìm kiếm sản phẩm, đơn hàng, khách hàng... (Cmd/Ctrl + K)"
        [value]="searchQuery()"
        (input)="onSearchChange($event)"
        (keydown)="onKeyDown($event)"
      />
      @if (isLoading()) {
        <svg lucideLoader2 class="text-primary w-5 h-5 flex-shrink-0 animate-spin" [attr.stroke-width]="2"></svg>
      } @else {
        <span class="text-[10px] font-medium tracking-wider text-gray-400 border border-gray-200 rounded px-1.5 py-0.5 bg-gray-50 flex-shrink-0">ESC</span>
      }
    </div>

    <!-- Results Area -->
    <div class="overflow-y-auto p-2 bg-gray-50/50 flex-1">
      @if (results().length === 0 && !isLoading()) {
        <div class="py-12 px-4 text-center text-sm text-gray-500">
          <svg lucidePackageOpen class="mx-auto mb-2 text-gray-400" [attr.stroke-width]="1.5" size="48"></svg>
          <p>Không tìm thấy kết quả nào cho "{{ searchQuery() }}"</p>
        </div>
      }

      @for (group of results(); track group.id) {
        <div class="mb-4 last:mb-0">
          <div class="px-3 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">{{ group.title }}</div>
          
          @for (item of group.items; track item.id) {
            <button
              type="button"
              class="w-full flex items-center px-3 py-2.5 rounded-xl cursor-pointer transition-colors duration-150 text-left mb-1 last:mb-0 bg-transparent border-none outline-none"
              [ngClass]="{
                'bg-primary/10 ring-1 ring-primary/20': flatItems().indexOf(item) === selectedIndex
              }"
              (click)="selectItem(item)"
              (mouseenter)="selectedIndex = flatItems().indexOf(item)"
            >
              <div 
                class="flex items-center justify-center w-8 h-8 rounded-lg mr-3 flex-shrink-0 transition-colors duration-150 border"
                [ngClass]="{
                  'bg-white text-primary shadow-sm border-primary/20': flatItems().indexOf(item) === selectedIndex,
                  'bg-gray-100 text-gray-500 border-transparent': flatItems().indexOf(item) !== selectedIndex
                }"
              >
                @switch (item.icon) {
                  @case ('LayoutDashboard') { <svg lucideLayoutDashboard class="w-4 h-4" [attr.stroke-width]="2"></svg> }
                  @case ('ShoppingBag') { <svg lucideShoppingBag class="w-4 h-4" [attr.stroke-width]="2"></svg> }
                  @case ('Package') { <svg lucidePackage class="w-4 h-4" [attr.stroke-width]="2"></svg> }
                  @case ('Users') { <svg lucideUsers class="w-4 h-4" [attr.stroke-width]="2"></svg> }
                  @case ('MessageCircle') { <svg lucideMessageCircle class="w-4 h-4" [attr.stroke-width]="2"></svg> }
                  @default { <svg lucidePackage class="w-4 h-4" [attr.stroke-width]="2"></svg> }
                }
              </div>
              <div class="flex flex-col flex-1 min-w-0">
                <span class="text-sm font-medium text-gray-900 truncate">{{ item.label }}</span>
                @if (item.description) {
                  <span class="text-xs text-gray-500 truncate mt-0.5">{{ item.description }}</span>
                }
              </div>
              @if (flatItems().indexOf(item) === selectedIndex) {
                <svg lucideCornerDownLeft class="text-primary opacity-60 ml-2 flex-shrink-0" [attr.stroke-width]="2" size="16"></svg>
              }
            </button>
          }
        </div>
      }
    </div>

    <!-- Footer Area (Optional hints) -->
    <div class="flex items-center justify-end px-4 py-2.5 border-t border-gray-100 bg-gray-50/80 gap-4 text-[11px] text-gray-500">
      <div class="flex items-center gap-1.5">
        <span class="bg-white border border-gray-200 rounded px-1.5 shadow-sm font-medium text-gray-600">↑</span>
        <span class="bg-white border border-gray-200 rounded px-1.5 shadow-sm font-medium text-gray-600">↓</span>
        <span>để di chuyển</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="bg-white border border-gray-200 rounded px-1.5 shadow-sm font-medium text-gray-600">↵</span>
        <span>để chọn</span>
      </div>
    </div>
  </div>
</p-dialog>
