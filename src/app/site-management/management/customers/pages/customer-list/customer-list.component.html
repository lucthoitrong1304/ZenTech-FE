<app-management-page-shell>
  <app-management-page-hero
    eyebrow="Trung tâm hồ sơ khách hàng"
    title="Quản lý khách hàng"
    description="Quản lý hồ sơ khách hàng, kiểm soát quyền truy cập và phân tích lịch sử giao dịch."
  />

  <app-management-toolbar-surface>
    <app-customer-toolbar
      [keyword]="store.query().keyword"
      [activeFilter]="store.query().activeFilter"
      [sort]="store.query().sort"
      [loading]="store.loading()"
      [countLabel]="store.customerCountLabel()"
      (keywordChange)="setKeyword($event)"
      (activeFilterChange)="setActiveFilter($event)"
      (sortChange)="setSort($event)"
      (refresh)="store.refresh()"
    />
  </app-management-toolbar-surface>

  <div class="zt-management-stats-grid zt-management-stats-grid--3">
    <app-management-stat-card
      label="Tổng số khách hàng"
      [value]="store.totalElements()"
      hint="Tài khoản trong hệ thống"
      [hasIcon]="false"
    />
    <app-management-stat-card
      label="Trạng thái lọc"
      [value]="activeFilterLabel()"
      hint="Bộ lọc đang áp dụng"
      [hasIcon]="false"
    />
    <app-management-stat-card
      label="Tiêu chí sắp xếp"
      [value]="sortLabel()"
      hint="Thứ tự hiển thị"
      [hasIcon]="false"
    />
  </div>

  @if (store.error()) {
    <app-management-error-state title="Không thể tải dữ liệu" [message]="store.error() ?? ''">
      <button type="button" (click)="store.loadCustomers()">Thử lại</button>
    </app-management-error-state>
  } @else {
    <app-customer-table
      [customers]="store.customers()"
      [loading]="store.loading()"
      [empty]="store.isEmpty()"
      [page]="store.query().page"
      [size]="store.query().size"
      [totalElements]="store.totalElements()"
      [totalPages]="store.totalPages()"
      (viewCustomer)="store.loadSelectedCustomer($event)"
      (pageChange)="store.setPage($event.page, $event.size)"
      (statusChange)="confirmStatusChange($event)"
    />
  }

  <app-customer-detail-dialog
    [visible]="store.selectedCustomerLoading() || store.selectedCustomerVisible() || !!store.selectedCustomerError()"
    [customer]="store.selectedCustomer()"
    [loading]="store.selectedCustomerLoading()"
    [error]="store.selectedCustomerError()"
    [orders]="store.orders()"
    [ordersLoading]="store.ordersLoading()"
    [ordersPage]="store.ordersQuery().page"
    [ordersSize]="store.ordersQuery().size"
    [ordersTotalElements]="store.ordersTotalElements()"
    [ordersTotalPages]="store.ordersTotalPages()"
    (close)="store.closeSelectedCustomer()"
    (ordersPageChange)="store.setOrdersPage($event.page, $event.size)"
    (statusChange)="confirmStatusChange($event)"
  />
</app-management-page-shell>
