<app-management-page-shell>
  <app-management-page-hero
    eyebrow="Trung tâm điều phối đơn hàng"
    title="Quản lý Đơn hàng"
    description="Theo dõi, xử lý và cập nhật trạng thái các đơn hàng trong hệ thống."
  >
    <button
      hero-actions
      type="button"
      class="zt-management-primary-action"
      (click)="exportReport()"
    >
      <svg lucideFileDown [attr.stroke-width]="2.2"></svg>
      <span>Xuất báo cáo</span>
    </button>
  </app-management-page-hero>

  <div class="zt-management-stats-grid zt-management-stats-grid--3">
    <app-management-stat-card
      label="Tổng đơn hàng"
      [value]="store.totalElements()"
      hint="Tổng số bản ghi phù hợp"
      [hasIcon]="false"
    />
    <app-management-stat-card
      label="Trang hiện tại"
      [value]="store.totalPages() === 0 ? 0 : store.query().page + 1"
      [hint]="store.totalPages() + ' trang'"
      [hasIcon]="false"
    />
    <app-management-stat-card
      label="Đang hiển thị"
      [value]="store.orders().length"
      hint="Đơn hàng trên trang này"
      [hasIcon]="false"
    />
  </div>

  <app-management-toolbar-surface>
    <app-order-toolbar
      [keyword]="store.query().keyword"
      [status]="store.query().status"
      [dateFilter]="store.query().dateFilter"
      [sort]="store.query().sort"
      [activeFilterCount]="store.activeFilterCount()"
      [loading]="store.loading()"
      (keywordChange)="setKeyword($event)"
      (statusChange)="setStatusFilter($event)"
      (dateFilterChange)="setDateFilter($event)"
      (sortChange)="setSort($event)"
      (applyFilters)="store.applyFilters()"
      (resetFilters)="store.resetFilters()"
    />
  </app-management-toolbar-surface>

  <app-order-table
    [orders]="store.orders()"
    [loading]="store.loading()"
    [page]="store.query().page"
    [totalPages]="store.totalPages()"
    [totalElements]="store.totalElements()"
    [pageStart]="store.pageStart()"
    [pageEnd]="store.pageEnd()"
    [canGoPrevious]="store.canGoPrevious()"
    [canGoNext]="store.canGoNext()"
    (viewOrder)="store.openDetail($event)"
    (editOrder)="store.openEdit($event)"
    (pageChange)="store.goToPage($event)"
  />

  <app-order-detail-drawer
    [visible]="store.detailDrawerOpen()"
    [order]="store.selectedOrder()"
    (close)="store.closeDrawer()"
    (markDelivered)="store.markDelivered($event)"
    (printInvoice)="printInvoice($event)"
  />

  <app-order-edit-drawer
    [visible]="store.editDrawerOpen()"
    [order]="store.selectedOrder()"
    [draft]="store.editDraft()"
    [errors]="store.editErrors()"
    [saving]="store.saving()"
    (close)="store.closeDrawer()"
    (cancel)="store.cancelEdit()"
    (save)="store.saveEditDraft()"
    (draftChange)="updateDraft($event)"
    (quantityChange)="updateQuantity($event)"
  />
</app-management-page-shell>
