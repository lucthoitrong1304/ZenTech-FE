<div class="fixed inset-0 z-[80] grid place-items-center bg-black/60 px-4 py-6 backdrop-blur-sm">
  <section
    class="w-full max-w-xl overflow-hidden rounded-[10px] border border-[#d2c5ab]/30 bg-[#fcf9f8] shadow-[0_28px_90px_-30px_rgba(0,0,0,0.55)]"
    role="dialog"
    aria-modal="true"
    aria-labelledby="add-review-title"
  >
    <div class="border-b border-[#d2c5ab]/25 bg-white px-6 py-5">
      <p class="text-[11px] font-black uppercase tracking-[0.2em] text-[#4b41e1]">
        Thêm đánh giá
      </p>
      <h2 id="add-review-title" class="mt-2 text-2xl font-black uppercase italic text-[#1c1b1b]">
        {{ productName() }}
      </h2>
    </div>

    <form class="space-y-5 p-6" (ngSubmit)="submitReview.emit()">
      <div>
        <label class="text-[11px] font-black uppercase tracking-[0.18em] text-[#4f4632]">
          Rating
        </label>
        <div class="mt-3 flex gap-2">
          @for (rating of ratingValues; track rating) {
            <button
              type="button"
              class="grid h-11 w-11 place-items-center rounded-[8px] border text-xl transition"
              [ngClass]="
                draft().rating >= rating
                  ? 'border-[#ffc700] bg-[#ffc700] text-[#251a00]'
                  : 'border-[#d2c5ab] bg-white text-[#81765f] hover:border-[#ffc700]'
              "
              (click)="updateRating(rating)"
              [attr.aria-label]="'Rate ' + rating + ' stars'"
            >
              ★
            </button>
          }
        </div>
        @if (error()?.rating) {
          <p class="mt-2 text-sm text-[#be0037]">{{ error()?.rating }}</p>
        }
      </div>

      <label class="block">
        <span class="text-[11px] font-black uppercase tracking-[0.18em] text-[#4f4632]">
          Tên hiển thị
        </span>
        <input
          type="text"
          [ngModel]="draft().reviewerName"
          name="reviewerName"
          (ngModelChange)="updateField('reviewerName', $event)"
          class="mt-2 w-full rounded-[10px] border border-[#d2c5ab]/70 bg-white px-4 py-3 text-sm outline-none transition focus:border-[#4b41e1]"
          placeholder="ZenTech Customer"
        />
      </label>

      <label class="block">
        <span class="text-[11px] font-black uppercase tracking-[0.18em] text-[#4f4632]">
          Tiêu đề
        </span>
        <input
          type="text"
          [ngModel]="draft().title"
          name="title"
          (ngModelChange)="updateField('title', $event)"
          class="mt-2 w-full rounded-[10px] border border-[#d2c5ab]/70 bg-white px-4 py-3 text-sm outline-none transition focus:border-[#4b41e1]"
          placeholder="Sản phẩm dùng rất ổn"
        />
        @if (error()?.title) {
          <p class="mt-2 text-sm text-[#be0037]">{{ error()?.title }}</p>
        }
      </label>

      <label class="block">
        <span class="text-[11px] font-black uppercase tracking-[0.18em] text-[#4f4632]">
          Nội dung
        </span>
        <textarea
          [ngModel]="draft().comment"
          name="comment"
          (ngModelChange)="updateField('comment', $event)"
          rows="5"
          class="mt-2 w-full resize-none rounded-[10px] border border-[#d2c5ab]/70 bg-white px-4 py-3 text-sm leading-6 outline-none transition focus:border-[#4b41e1]"
          placeholder="Chia sẻ trải nghiệm thực tế của bạn..."
        ></textarea>
        @if (error()?.comment) {
          <p class="mt-2 text-sm text-[#be0037]">{{ error()?.comment }}</p>
        }
      </label>

      @if (error()?.submit) {
        <p class="rounded-[8px] bg-[#ffdada] px-4 py-3 text-sm text-[#920028]">
          {{ error()?.submit }}
        </p>
      }

      <div class="flex flex-col-reverse gap-3 border-t border-[#d2c5ab]/25 pt-5 sm:flex-row sm:justify-end">
        <button
          type="button"
          class="rounded-[10px] border border-[#d2c5ab] px-5 py-3 text-[11px] font-black uppercase tracking-[0.18em] text-[#1c1b1b] transition hover:border-[#4b41e1] hover:text-[#4b41e1]"
          (click)="cancelReview.emit()"
          [disabled]="submitting()"
        >
          Huỷ
        </button>
        <button
          type="submit"
          class="rounded-[10px] bg-[#101010] px-5 py-3 text-[11px] font-black uppercase tracking-[0.18em] text-white transition hover:bg-[#4b41e1] disabled:cursor-wait disabled:bg-[#81765f]"
          [disabled]="submitting()"
        >
          {{ submitting() ? 'Đang gửi...' : 'Gửi đánh giá' }}
        </button>
      </div>
    </form>
  </section>
</div>
