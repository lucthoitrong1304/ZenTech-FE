<div class="space-y-4">
  @for (review of reviews(); track review.id) {
    <article class="min-w-0 rounded-[10px] border border-[#d2c5ab]/25 bg-white p-5">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div class="min-w-0">
          <h3 class="break-words font-black text-[#1c1b1b]">{{ review.title }}</h3>
          <p class="mt-1 text-sm text-[#4f4632]">
            {{ review.reviewerName }} · {{ review.createdAt | date: 'mediumDate' }}
          </p>
        </div>
        <div class="text-sm font-black text-[#9b6500]">
          {{ review.rating }}/5 ★
        </div>
      </div>
      <p class="mt-4 text-sm leading-7 text-[#4f4632]">{{ review.comment }}</p>
    </article>
  } @empty {
    <div class="rounded-[10px] border border-dashed border-[#d2c5ab] bg-white p-6 text-sm text-[#4f4632]">
      Chưa có đánh giá nào cho sản phẩm này.
    </div>
  }
</div>
