<section class="relative overflow-hidden bg-[#101010]">
  <div
    class="absolute inset-0 bg-[linear-gradient(100deg,rgba(16,16,16,0.98),rgba(16,16,16,0.84)_46%,rgba(75,65,225,0.28)_100%)]"
  ></div>

  <div class="relative mx-auto flex min-h-[20rem] max-w-7xl items-end px-4 py-14 sm:px-6 lg:px-8">
    <div class="max-w-3xl space-y-5">
      <p class="text-xs font-bold uppercase tracking-[0.28em] text-[#ffc700]">
        ZenTech Catalog
      </p>
      <h1
        class="text-4xl font-black uppercase italic tracking-[-0.05em] text-white sm:text-5xl lg:text-6xl"
      >
        {{ category().label }}
      </h1>

      <div
        class="inline-flex items-center rounded-full border border-white/12 bg-white/6 px-4 py-2 text-[11px] font-bold uppercase tracking-[0.18em] text-white/75"
      >
        {{ productCount() }} sản phẩm đang hiển thị
      </div>
    </div>
  </div>
</section>
