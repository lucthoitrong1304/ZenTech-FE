<section class="relative overflow-hidden bg-[#101010]">
  <img
    [src]="category().heroImage"
    [alt]="category().label"
    class="absolute inset-0 h-full w-full object-cover opacity-35"
  />
  <div
    class="absolute inset-0 bg-[linear-gradient(100deg,rgba(16,16,16,0.96),rgba(16,16,16,0.76)_42%,rgba(16,16,16,0.34)_76%,rgba(16,16,16,0.25))]"
  ></div>

  <div class="relative mx-auto flex min-h-[20rem] max-w-7xl items-end px-4 py-14 sm:px-6 lg:px-8">
    <div class="max-w-3xl space-y-5">
      <p class="text-xs font-bold uppercase tracking-[0.28em] text-[#ffc700]">
        {{ category().heroEyebrow || 'ZenTech Catalog' }}
      </p>
      <div class="space-y-3">
        <h1
          class="text-4xl font-black uppercase italic tracking-[-0.05em] text-white sm:text-5xl lg:text-6xl"
        >
          {{ category().label }}
        </h1>
        <p class="text-sm font-bold uppercase tracking-[0.22em] text-white/55 sm:text-[13px]">
          {{ category().subtitle }}
        </p>
      </div>

      <p class="max-w-2xl text-sm leading-7 text-white/70 sm:text-base">
        {{ category().description }}
      </p>

      <div
        class="inline-flex items-center rounded-full border border-white/12 bg-white/6 px-4 py-2 text-[11px] font-bold uppercase tracking-[0.18em] text-white/75"
      >
        {{ productCount() }} sản phẩm mock
      </div>
    </div>
  </div>
</section>
