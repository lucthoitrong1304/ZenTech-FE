<div class="product-listing-page min-h-screen bg-[#fcf9f8] text-[#1c1b1b]">
  <app-site-header
    [navItems]="navItems"
    [activeNavLabel]="(vm$ | async)?.category?.label || null"
    [cartCount]="2"
    [currentUser]="currentUser$ | async"
    (logout)="onLogout()"
  />

  @if (vm$ | async; as vm) {
    <main>
      @if (vm.loading) {
        <section class="relative overflow-hidden bg-[#101010]">
          <div class="mx-auto max-w-7xl px-4 py-16 sm:px-6 lg:px-8">
            <div class="h-3 w-40 animate-pulse rounded-full bg-white/12"></div>
            <div class="mt-6 h-14 w-72 animate-pulse rounded-full bg-white/12"></div>
            <div class="mt-5 h-4 max-w-2xl animate-pulse rounded-full bg-white/10"></div>
            <div class="mt-3 h-4 max-w-xl animate-pulse rounded-full bg-white/10"></div>
          </div>
        </section>

        <section class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8 lg:py-12">
          <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
            @for (card of skeletonCards; track card) {
              <div class="rounded-[10px] border border-[#d2c5ab]/25 bg-white p-4">
                <div class="aspect-[4/3] animate-pulse rounded-[8px] bg-[#ebe7e7]"></div>
                <div class="mt-5 h-3 w-24 animate-pulse rounded-full bg-[#ebe7e7]"></div>
                <div class="mt-3 h-6 w-2/3 animate-pulse rounded-full bg-[#ebe7e7]"></div>
                <div class="mt-4 h-5 w-32 animate-pulse rounded-full bg-[#ebe7e7]"></div>
                <div class="mt-5 h-11 animate-pulse rounded-[10px] bg-[#ebe7e7]"></div>
              </div>
            }
          </div>
        </section>
      } @else if (vm.category) {
        <app-product-listing-hero
          [category]="vm.category"
          [productCount]="vm.sortedProducts.length"
        />

        <app-product-listing-toolbar
          [category]="vm.category"
          [productCount]="vm.sortedProducts.length"
          [sortOptions]="sortOptions"
          [selectedSort]="vm.sortBy"
          (sortChange)="onSortChange($event)"
        />

        @if (vm.isEmpty) {
          <app-product-empty-state
            [title]="'Danh mục ' + vm.category.label + ' chưa có sản phẩm mock.'"
            [description]="
              'Phần UI đã sẵn sàng để nối API thật. Tạm thời danh mục này đang để trống để chúng ta dễ thay thế dữ liệu sau.'
            "
          />
        } @else {
          <app-product-grid [products]="vm.sortedProducts" />
        }
      } @else {
        <app-product-empty-state
          [isInvalidCategory]="vm.isInvalidCategory"
          title="Không tìm thấy danh mục phù hợp."
          [description]="vm.error || 'Slug hiện tại không khớp với mock catalog.'"
        />
      }
    </main>
  }
</div>
