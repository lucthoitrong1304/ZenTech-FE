<div class="customer-chat-page min-h-screen bg-[#f6f3f2] text-[#101010]">
  <app-site-header
    [navItems]="navItems()"
    [activeNavLabel]="null"
    [cartCount]="2"
    [currentUser]="currentUser()"
    (logout)="onLogout()"
  />

  <main class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-[1400px] flex-col px-3 py-4 sm:px-4 lg:py-6">
    <section class="customer-chat-full flex min-h-[44rem] flex-1 overflow-hidden rounded-[8px] bg-white shadow-[0_28px_80px_-56px_rgba(16,16,16,0.65)] ring-1 ring-[#d2c5ab]/35">
      <div class="flex min-w-0 flex-1 flex-col">
        <app-customer-chat-header
          [staff]="store.staff()"
          [product]="store.product()"
          [sharedSidebarOpen]="store.sharedSidebarOpen()"
          (closeClicked)="store.closeSharedSidebar()"
          (sharedClicked)="store.toggleSharedSidebar()"
        />

        @if (store.loading()) {
          <div class="grid flex-1 place-items-center bg-[#fcf9f8] text-sm font-black text-[#4f4632]">
            Đang tải cuộc trò chuyện...
          </div>
        } @else if (store.session()) {
          <div class="flex min-h-0 flex-1">
            <div class="flex min-w-0 flex-1 flex-col">
              <div class="flex shrink-0 items-center justify-between gap-3 border-b border-[#d2c5ab]/25 bg-white px-5 py-3">
                <div class="min-w-0">
                  <p class="text-[10px] font-black uppercase tracking-[0.2em] text-[#4f4632]">
                    Cuộc trò chuyện
                  </p>
                  <h1 class="truncate text-xl font-black text-[#101010]">
                    Tư vấn sản phẩm với ZenTech
                  </h1>
                </div>
                <button
                  type="button"
                  class="grid h-10 w-10 shrink-0 place-items-center rounded-[8px] bg-[#f6f3f2] text-[#4f4632] transition hover:bg-[#101010] hover:text-white"
                  (click)="store.toggleSharedSidebar()"
                  title="Bật/tắt nội dung đã chia sẻ"
                >
                  @if (store.sharedSidebarOpen()) {
                    <svg lucidePanelRightClose class="h-5 w-5" [attr.stroke-width]="2"></svg>
                  } @else {
                    <svg lucidePanelRightOpen class="h-5 w-5" [attr.stroke-width]="2"></svg>
                  }
                </button>
              </div>

              <app-customer-message-timeline
                [messages]="store.messages()"
                [customer]="store.customer()"
                [staff]="store.staff()"
              />

              <app-customer-upload-queue
                [uploads]="store.uploads()"
                (uploadRemoved)="store.removeUpload($event)"
              />

              <app-customer-chat-composer
                (messageSubmitted)="store.sendMessage($event)"
                (filesSelected)="store.selectFiles($event)"
              />
            </div>

            <app-customer-shared-content-sidebar
              [open]="store.sharedSidebarOpen()"
              [activeTab]="store.activeSharedTab()"
              [items]="store.selectedSharedItems()"
              [mediaCount]="store.sharedCounts().media"
              [fileCount]="store.sharedCounts().files"
              [linkCount]="store.sharedCounts().links"
              (tabSelected)="store.setSharedContentTab($event)"
              (closed)="store.closeSharedSidebar()"
            />
          </div>
        } @else {
          <div class="grid flex-1 place-items-center bg-[#fcf9f8] p-8 text-center">
            <div>
              <p class="text-[11px] font-black uppercase tracking-[0.2em] text-[#4b41e1]">
                ZenTech Support
              </p>
              <h1 class="mt-3 text-2xl font-black">Chưa thể mở cuộc trò chuyện.</h1>
              <p class="mt-2 text-sm font-semibold text-[#4f4632]">
                {{ store.errorMessage() || 'Vui lòng thử lại sau.' }}
              </p>
            </div>
          </div>
        }
      </div>
    </section>
  </main>
</div>
