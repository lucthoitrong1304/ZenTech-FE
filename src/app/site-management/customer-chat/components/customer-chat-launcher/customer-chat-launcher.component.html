<button
  type="button"
  class="group fixed bottom-5 right-5 z-40 grid h-12 w-12 place-items-center rounded-full bg-white text-zinc-900 shadow-[0_8px_30px_rgba(0,0,0,0.08)] border border-zinc-200/60 transition-all duration-200 hover:-translate-y-0.5 hover:bg-zinc-50 hover:shadow-[0_12px_36px_rgba(0,0,0,0.12)] active:scale-95 cursor-pointer"
  (click)="opened.emit()"
>
  <span class="grid h-8.5 w-8.5 place-items-center rounded-full bg-[#ffc700] text-zinc-900 transition-transform group-hover:scale-105">
    <svg lucideMessageCircle class="h-[18px] w-[18px]" [attr.stroke-width]="2.2"></svg>
  </span>
</button>
