<section class="relative flex h-full min-h-[28rem] flex-1 items-center justify-center overflow-hidden bg-[#fcf9f8] p-12">
  <div
    class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_rgba(246,243,242,0.95),_rgba(252,249,248,0.75),_rgba(252,249,248,1))]"
  ></div>

  <div class="relative z-10 flex max-w-sm flex-col items-center text-center">
    <div
      class="mb-6 grid h-20 w-20 place-items-center rounded-[8px] border border-[#d2c5ab]/20 bg-[#f6f3f2] text-[#4f4632] shadow-sm"
    >
      <svg lucideMessageCircle class="h-10 w-10 opacity-70" [attr.stroke-width]="1.8"></svg>
    </div>
    <h3 class="mb-3 text-xl font-black tracking-tight text-[#1c1b1b]">Chưa chọn tư vấn</h3>
    <p class="text-sm font-medium leading-relaxed text-[#4f4632]">
      Chọn một tư vấn khách hàng từ danh sách bên trái để bắt đầu xử lý.
    </p>
  </div>
</section>
