<!-- =============================================
     HEADER – Store Owner Dashboard
     selector: app-header
     Height: 64px | White bg | Bottom border
     ============================================= -->
<header class="admin-header">

  <!-- Left: Breadcrumb -->
  <nav class="admin-header__breadcrumb" aria-label="Breadcrumb">
    <a href="#" class="admin-header__breadcrumb-link">Trang chủ</a>
    <svg class="admin-header__breadcrumb-sep"
         width="14" height="14"
         fill="none" stroke="currentColor" viewBox="0 0 24 24"
         aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
    </svg>
    <span class="admin-header__breadcrumb-current">Business Dashboard</span>
  </nav>

  <!-- Right: actions -->
  <div class="admin-header__actions">
    <!-- Divider -->
    <div class="admin-header__divider"></div>

    <!-- User info + avatar -->
    <div class="admin-header__user">
      <div class="admin-header__user-trigger">
        <!-- Text info -->
        <div class="admin-header__user-info">
          <span class="admin-header__user-name">Đức Lộc</span>
          <span class="admin-header__user-role">CEO / Owner</span>
        </div>
        <!-- Avatar -->
        <div class="admin-header__avatar">ĐL</div>
      </div>

      <!-- Dropdown menu -->
      <div class="admin-header__dropdown">

        <a href="#" class="admin-header__dropdown-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Cập nhật thông tin
        </a>

        <div class="admin-header__dropdown-sep"></div>

        <a href="#" class="admin-header__dropdown-item admin-header__dropdown-item--danger">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Đăng xuất
        </a>

      </div>
    </div>

  </div>
</header>
