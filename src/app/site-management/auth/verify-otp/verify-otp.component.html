<app-auth-shell>
  <div class="auth-page auth-page--compact">
    <header class="auth-page__hero">
      <p class="auth-page__eyebrow">Bảo mật ZenTech</p>
      <h1 class="auth-page__title">Xác minh danh tính</h1>
      <p class="auth-page__subtitle">
        Nhập mã gồm 6 chữ số vừa được gửi đến email hoặc thiết bị đã đăng ký của bạn.
      </p>
    </header>

    <form class="auth-otp" (ngSubmit)="onVerify()">
      <div class="auth-otp__grid">
        <input class="auth-otp__digit" type="text" inputmode="numeric" maxlength="1" value="7" />
        <input class="auth-otp__digit" type="text" inputmode="numeric" maxlength="1" value="2" />
        <input class="auth-otp__digit" type="text" inputmode="numeric" maxlength="1" />
        <input class="auth-otp__digit" type="text" inputmode="numeric" maxlength="1" />
        <input class="auth-otp__digit" type="text" inputmode="numeric" maxlength="1" />
        <input class="auth-otp__digit" type="text" inputmode="numeric" maxlength="1" />
      </div>

      <button type="submit" mat-flat-button class="auth-btn-primary">
        <span class="auth-btn-content">Xác nhận và tiếp tục</span>
      </button>

      <div class="auth-otp__meta">
        <button type="button" class="auth-link auth-link--inline">Gửi lại mã</button>
        <div class="auth-otp__timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="8"></circle>
            <path d="M12 8v4l2 2"></path>
          </svg>
          <span>01:59</span>
        </div>
      </div>
    </form>
  </div>
</app-auth-shell>
