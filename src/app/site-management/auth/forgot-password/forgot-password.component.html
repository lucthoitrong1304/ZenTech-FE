<div class="auth-wrapper">
  <div class="auth-card-centered">

    <h2 class="auth-title">
      Quên mật khẩu?
    </h2>
    <p class="auth-subtitle">
      Đừng lo, hãy điền email của bạn vào bên dưới. Chúng tôi sẽ gửi mã OTP để giúp bạn lấy lại quyền truy cập.
    </p>

    <form class="auth-form" (ngSubmit)="onSendOtp()">
      <div class="auth-input-container">
        <mat-form-field appearance="outline" class="auth-input">
          <mat-label>Email khôi phục</mat-label>
          <input matInput type="email" placeholder="Nhập địa chỉ email" required>
        </mat-form-field>
      </div>

      <div>
        <button type="submit" mat-flat-button class="auth-btn-primary">
          Gửi mã OTP
        </button>
      </div>
    </form>

    <div class="auth-footer">
      <a routerLink="/auth/login" class="auth-link-secondary">
        <span>&larr;</span> Quay lại Đăng nhập
      </a>
    </div>

  </div>
</div>
