<app-auth-shell>
  <div class="auth-page auth-page--compact">
    <header class="auth-page__hero">
      <p class="auth-page__eyebrow">Khôi phục truy cập</p>
      <h1 class="auth-page__title">Quên mật khẩu</h1>
    </header>

    <section class="auth-card auth-card--airy">
      <p class="auth-page__subtitle">
        Nhập email gắn với tài khoản ZenTech. Chúng tôi sẽ gửi đường dẫn bảo mật để bạn
        đặt lại mật khẩu.
      </p>

      <form class="auth-form" [formGroup]="forgotPasswordForm" (ngSubmit)="onSendRecoveryEmail()">
        <div class="auth-field-group">
          <label class="auth-field-label" for="forgot-email">Email khoi phuc</label>
          <div class="auth-field-shell">
            <input
              id="forgot-email"
              pInputText
              class="auth-field"
              type="email"
              formControlName="email"
              placeholder="email@zentech.vn"
            />
            <span class="auth-field-icon" aria-hidden="true">
              <svg lucideMail [attr.stroke-width]="1.8"></svg>
            </span>
          </div>
          @if (hasControlError('required')) {
            <p class="auth-field-error">Email không được để trống.</p>
          } @else if (hasControlError('email')) {
            <p class="auth-field-error">Email không đúng định dạng.</p>
          }
        </div>

        <button
          pButton
          type="submit"
          class="auth-btn-primary"
          [loading]="passwordRecoveryStore.loading()"
          [disabled]="forgotPasswordForm.invalid || passwordRecoveryStore.loading()"
        >
          <span class="auth-btn-content">
            <span>
              {{ passwordRecoveryStore.loading() ? 'Đang gửi email...' : 'Gửi email khôi phục'  }}
            </span>
            @if (!passwordRecoveryStore.loading()) {
              <svg lucideArrowRight class="auth-button-icon" [attr.stroke-width]="2"></svg>
            }
          </span>
        </button>
      </form>

      <p class="auth-footer-note">
        <a routerLink="/auth/login" class="auth-support-link">
          <svg lucideArrowRight class="auth-button-icon rotate-180" [attr.stroke-width]="2"></svg>
          <strong>Quay lại đăng nhập</strong>
        </a>
      </p>
    </section>
  </div>
</app-auth-shell>
