<app-auth-shell>
  <div class="auth-page auth-page--compact">
    <header class="auth-page__hero">
      <p class="auth-page__eyebrow">Khôi phục truy cập</p>
      <h1 class="auth-page__title">Quên mật khẩu</h1>
    </header>

    <section class="auth-card auth-card--airy">
      <p class="auth-page__subtitle">
        Nhập email gắn với tài khoản ZenTech. Chúng tôi sẽ gửi mã OTP để bạn lấy lại
        quyền truy cập một cách an toàn.
      </p>

      <form class="auth-form" (ngSubmit)="onSendOtp()">
        <div class="auth-field-group">
          <label class="auth-field-label" for="forgot-email">Email khôi phục</label>
          <div class="auth-field-shell">
            <mat-form-field appearance="outline" class="auth-field">
              <input
                id="forgot-email"
                matInput
                type="email"
                placeholder="email@zentech.vn"
                required
              />
            </mat-form-field>
            <span class="auth-field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 6h16v12H4z"></path>
                <path d="m4 8 8 6 8-6"></path>
              </svg>
            </span>
          </div>
        </div>

        <button type="submit" mat-flat-button class="auth-btn-primary">
          <span class="auth-btn-content">
            <span>Gửi mã OTP</span>
            <svg class="auth-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14"></path>
              <path d="m13 5 7 7-7 7"></path>
            </svg>
          </span>
        </button>
      </form>

      <p class="auth-footer-note">
        <a routerLink="/auth/login" class="auth-support-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
          <strong>Quay lại đăng nhập</strong>
        </a>
      </p>
    </section>
  </div>
</app-auth-shell>
