<app-auth-shell>
  <div class="auth-page">
    <header class="auth-page__hero">
      <p class="auth-page__eyebrow">ZenTech Membership</p>
      <h1 class="auth-page__title">Tạo tài khoản mới</h1>
    </header>

    <section class="auth-card auth-card--airy">
      <form class="auth-form" (ngSubmit)="onRegister()">
        <div class="auth-field-group">
          <label class="auth-field-label" for="register-name">Họ và tên</label>
          <div class="auth-field-shell">
            <mat-form-field appearance="outline" class="auth-field">
              <input
                id="register-name"
                matInput
                type="text"
                placeholder="Nguyễn Văn A"
                required
              />
            </mat-form-field>
            <span class="auth-field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
                <path d="M5 20a7 7 0 0 1 14 0"></path>
              </svg>
            </span>
          </div>
        </div>

        <div class="auth-field-group">
          <label class="auth-field-label" for="register-email">Email</label>
          <div class="auth-field-shell">
            <mat-form-field appearance="outline" class="auth-field">
              <input
                id="register-email"
                matInput
                type="email"
                placeholder="hello@zentech.vn"
                required
              />
            </mat-form-field>
            <span class="auth-field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 6h16v12H4z"></path>
                <path d="m4 8 8 6 8-6"></path>
              </svg>
            </span>
          </div>
        </div>

        <div class="auth-form__row auth-form__row--double">
          <div class="auth-field-group">
            <label class="auth-field-label" for="register-password">Mật khẩu</label>
            <div class="auth-field-shell">
              <mat-form-field appearance="outline" class="auth-field">
                <input
                  id="register-password"
                  matInput
                  type="password"
                  placeholder="••••••••"
                  required
                />
              </mat-form-field>
              <span class="auth-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                  <path d="M8 10V7a4 4 0 1 1 8 0v3"></path>
                </svg>
              </span>
            </div>
          </div>

          <div class="auth-field-group">
            <label class="auth-field-label" for="register-confirm-password">
              Xác nhận mật khẩu
            </label>
            <div class="auth-field-shell">
              <mat-form-field appearance="outline" class="auth-field">
                <input
                  id="register-confirm-password"
                  matInput
                  type="password"
                  placeholder="••••••••"
                  required
                />
              </mat-form-field>
              <span class="auth-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="m9 12 2 2 4-4"></path>
                  <path d="M12 22c5-2 8-6 8-11V5l-8-3-8 3v6c0 5 3 9 8 11Z"></path>
                </svg>
              </span>
            </div>
          </div>
        </div>

        <button type="submit" mat-flat-button class="auth-btn-primary">
          <span class="auth-btn-content">
            <span>Tạo tài khoản</span>
            <svg class="auth-button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14"></path>
              <path d="m13 5 7 7-7 7"></path>
            </svg>
          </span>
        </button>
      </form>

      <p class="auth-footer-note">
        Đã có tài khoản?
        <a routerLink="/auth/login"><strong>Đăng nhập ngay</strong></a>
      </p>
    </section>
  </div>
</app-auth-shell>
