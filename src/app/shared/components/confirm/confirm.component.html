<h2 mat-dialog-title class="confirm-title">
  {{ data.title }}
</h2>
<mat-dialog-content class="confirm-content">
  <p>{{ data.content }}</p>
</mat-dialog-content>
<mat-dialog-actions class="confirm-actions" align="end">
  <button mat-button (click)="onNo()" class="btn-cancel">No</button>
  <button mat-button (click)="onYes()" class="btn-confirm" cdkFocusInitial>Yes</button>
</mat-dialog-actions>
