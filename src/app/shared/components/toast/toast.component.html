<div class="toast-container">
  @for (toast of toasts(); track toast.id) {
    <div class="toast toast-{{ getToastClass(toast.type) }}">
      <img [src]="getIconPath(toast.type)" alt="" class="toast-icon" />
      <div class="toast-message">{{ toast.message }}</div>
      <button type="button" class="toast-close" (click)="close(toast.id)">×</button>
    </div>
  }
</div>
