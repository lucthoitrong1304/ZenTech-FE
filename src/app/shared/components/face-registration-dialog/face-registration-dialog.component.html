<p-dialog 
  [visible]="visible()" 
  (visibleChange)="handleHide()" 
  [modal]="true" 
  [draggable]="false"
  [resizable]="false"
  header="Đăng ký Khuôn mặt"
  styleClass="face-registration-dialog rounded-2xl overflow-hidden shadow-lg"
  [style]="{ width: '500px', maxWidth: '90vw' }"
>
  <div class="flex flex-col items-center justify-center p-4">
    <!-- Instruction Text -->
    <div class="mb-4 text-center">
      <h3 class="text-lg font-bold text-gray-900">{{ stepInstruction() }}</h3>
      <p class="text-sm" 
         [ngClass]="{
           'text-red-500 font-semibold': status() !== 'VALID' && status() !== 'INITIALIZING',
           'text-green-600 font-bold': status() === 'VALID',
           'text-gray-500': status() === 'INITIALIZING'
         }">
        {{ feedbackText() }}
      </p>
    </div>

    <!-- Camera Viewport -->
    <div class="camera-container relative rounded-2xl overflow-hidden bg-gray-100 shadow-inner" style="width: 320px; height: 320px;">
      
      <!-- Video Element -->
      <video 
        #videoElement 
        autoplay 
        muted 
        playsinline
        class="absolute inset-0 w-full h-full object-cover transform -scale-x-100"
      ></video>
      
      <!-- Overlay Guide (Oval) -->
      <div class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
        <div class="w-48 h-64 border-4 rounded-[40%] transition-colors duration-300"
             [ngClass]="{
               'border-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)]': status() === 'VALID',
               'border-red-500': status() !== 'VALID' && status() !== 'INITIALIZING',
               'border-gray-300': status() === 'INITIALIZING'
             }">
        </div>
      </div>
      
      <!-- Scanning Effect -->
      <div class="absolute inset-0 z-20 bg-primary/10 pointer-events-none scan-line" *ngIf="status() === 'VALID'"></div>
    </div>

    <!-- Progress Indicator -->
    <div class="flex gap-2 mt-6">
      <div class="w-16 h-2 rounded-full transition-colors duration-300" [ngClass]="step() >= 1 ? 'bg-primary' : 'bg-gray-200'"></div>
      <div class="w-16 h-2 rounded-full transition-colors duration-300" [ngClass]="step() >= 2 ? 'bg-primary' : 'bg-gray-200'"></div>
      <div class="w-16 h-2 rounded-full transition-colors duration-300" [ngClass]="step() >= 3 ? 'bg-primary' : 'bg-gray-200'"></div>
    </div>
  </div>
</p-dialog>
