<div class="error-container">
  <div class="error-card shadow-xl">
    <div class="icon-container mb-6">
      <svg lucideTriangleAlert class="error-icon" [attr.stroke-width]="1.8"></svg>
    </div>

    <h1 class="error-title">{{ errorData.title }}</h1>

    @if (errorData.code) {
      <div class="error-code-badge mb-4">
        <span class="font-semibold">Mã lỗi:</span> {{ errorData.code }}
      </div>
    }

    <p class="error-message">
      {{ errorData.message }}
    </p>

    <div class="action-container mt-8">
      <button pButton type="button" class="btn-go-home" (click)="goHome()">
        Trở về Trang Chủ
      </button>
    </div>
  </div>
</div>
