<button
  type="button"
  class="notification-bell-trigger"
  (click)="op.toggle($event)"
  aria-label="Thông báo"
>
  <svg lucideBell class="notification-bell-icon" [attr.stroke-width]="2"></svg>
  
  <span *ngIf="store.hasUnread()" 
        class="absolute right-0 top-0 grid h-4 w-4 place-items-center rounded-full border border-[#0a0a0a] bg-red-500 text-[9px] font-black text-white">
    {{ store.calculatedUnreadCount() > 99 ? '99+' : store.calculatedUnreadCount() }}
  </span>
</button>

<p-popover #op styleClass="notification-popover">
  <div class="notification-container flex flex-col w-[360px] bg-[#121212] text-slate-300">
    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-4 border-b border-white/5 bg-[#121212]">
      <div class="flex items-center gap-2">
        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-white m-0">Thông báo</h3>
        <span *ngIf="store.hasUnread()" class="px-2 py-0.5 rounded-full bg-white/10 text-[#ffc700] text-[9px] font-black uppercase tracking-wider">
          {{ store.calculatedUnreadCount() }} mới
        </span>
      </div>
      <button *ngIf="store.hasUnread()" 
              (click)="markAllAsRead()" 
              class="text-[10px] font-black uppercase tracking-wider text-slate-500 hover:text-white transition-colors bg-transparent border-0 cursor-pointer p-0">
        Đọc tất cả
      </button>
    </div>

    <!-- Content -->
    <div class="max-h-[360px] overflow-y-auto zt-scrollbar bg-[#121212]">
      <div *ngIf="store.loading()" class="p-8 text-center text-xs font-black uppercase tracking-wider text-slate-400 flex items-center justify-center gap-2">
        <div class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-white/20 border-t-white"></div>
        <span>Đang tải...</span>
      </div>
      
      <div *ngIf="!store.loading() && store.notifications().length === 0" class="py-12 px-6 text-center flex flex-col items-center justify-center">
        <div class="w-12 h-12 border border-white/10 bg-white/5 flex items-center justify-center mb-3 rounded-lg">
          <svg lucideBellOff class="w-5 h-5 text-white/40" [attr.stroke-width]="2"></svg>
        </div>
        <span class="text-xs font-black uppercase tracking-[0.2em] text-white">Hộp thư trống</span>
        <span class="text-[11px] font-semibold text-white/50 mt-1">Không có thông báo mới nào.</span>
      </div>

      <div *ngFor="let notification of store.notifications()" 
           (click)="onNotificationClick(notification, op)"
           class="notification-item p-4 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors relative flex items-start gap-3"
           [ngClass]="{'bg-white/[0.02]': !notification.isRead}">
        
        <!-- Left Icon Badge (Sleek rounded-lg cards instead of circles) -->
        <div class="flex-shrink-0">
          <div *ngIf="notification.type === 'CHAT_MESSAGE'" class="w-8 h-8 rounded-lg bg-blue-950/40 text-blue-400 flex items-center justify-center">
            <svg lucideMessageCircle class="w-4 h-4" [attr.stroke-width]="2.2"></svg>
          </div>
          <div *ngIf="notification.type === 'ORDER_STATUS'" class="w-8 h-8 rounded-lg bg-emerald-950/40 text-emerald-400 flex items-center justify-center">
            <svg lucidePackage class="w-4 h-4" [attr.stroke-width]="2.2"></svg>
          </div>
          <div *ngIf="notification.type === 'PROMOTION'" class="w-8 h-8 rounded-lg bg-amber-950/40 text-amber-400 flex items-center justify-center">
            <svg lucideTag class="w-4 h-4" [attr.stroke-width]="2.2"></svg>
          </div>
          <div *ngIf="notification.type === 'SYSTEM'" class="w-8 h-8 rounded-lg bg-white/10 text-white/80 flex items-center justify-center">
            <svg lucideInfo class="w-4 h-4" [attr.stroke-width]="2.2"></svg>
          </div>
          <div *ngIf="notification.type === 'AGENT_REQUEST'" class="w-8 h-8 rounded-lg bg-orange-950/40 text-orange-400 flex items-center justify-center">
            <svg lucideUser class="w-4 h-4" [attr.stroke-width]="2.2"></svg>
          </div>
          <div *ngIf="notification.type === 'CONVERSATION_TRANSFER'" class="w-8 h-8 rounded-lg bg-purple-950/40 text-purple-400 flex items-center justify-center">
            <svg lucideArrowRightLeft class="w-4 h-4" [attr.stroke-width]="2.2"></svg>
          </div>
        </div>
        
        <!-- Text content -->
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <p class="text-xs font-black uppercase tracking-wide text-white/90 leading-snug break-words m-0" [ngClass]="{'text-white font-black': !notification.isRead}">
              {{ notification.title }}
            </p>
            <!-- Unread Dot Indicator -->
            <span *ngIf="!notification.isRead" class="w-1.5 h-1.5 bg-[#4b41e1] rounded-full mt-1.5 flex-shrink-0"></span>
          </div>
          <p class="text-xs text-white/60 line-clamp-2 mt-1 leading-relaxed m-0 font-medium">
            {{ notification.content }}
          </p>
          <p class="text-[9px] font-black uppercase tracking-wider text-white/40 mt-1.5 m-0">
            {{ notification.createdAt | date:'HH:mm dd/MM/yyyy' }}
          </p>
        </div>
      </div>
    </div>
  </div>
</p-popover>
